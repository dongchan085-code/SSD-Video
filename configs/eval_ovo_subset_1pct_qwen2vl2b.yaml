# GPU-only pipeline check on a smaller VLM for the 1% OVO subset.

model:
  model_id: Qwen/Qwen2-VL-2B-Instruct
  dtype: float16
  device_map: cuda
  max_memory: null
  load_in_8bit: false

inference:
  num_frames: 4
  recent_frames_only: 4
  chunk_duration: 1.0
  fps: 1.0
  frame_sampling_strategy: recent
  resize_shortest_edge: 224
  max_new_tokens: 16
  temperature: 1.0
  top_p: 1.0
  top_k: 1
  do_sample: false
  use_cache: false

data:
  dataset_name: ovo_bench
  data_path: D:/ssd_video_data/ovo_subset_1pct
  anno_path: D:/ssd_video_data/ovo_subset_1pct/ovo_bench_subset.json
  chunked_dir: D:/ssd_video_data/ovo_subset_1pct/chunked_videos
  split: test
  batch_size: 1
  num_workers: 0

evaluation:
  metrics:
    - accuracy
    - per_task_accuracy
    - lock_fork_split
  save_predictions: true
  partial_predictions_file: ./results/ovo_1pct/ovo_base_qwen2vl2b_gpu.partial_predictions.jsonl
  resume_partial: true
  output_format: json
  save_detailed_results: true

logging:
  log_level: INFO
  log_interval: 10

hardware:
  cuda_visible_devices: 0
  seed: 42
