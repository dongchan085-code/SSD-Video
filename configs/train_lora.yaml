# LoRA Fine-tuning Configuration
# Stage 1: LoRA adaptation on SSD samples (rank 128, alpha 256)

model:
  model_id: Qwen/Qwen3-VL-8B-Instruct
  dtype: bfloat16
  device_map: auto
  load_in_8bit: false
  load_in_4bit: false

lora:
  r: 128
  lora_alpha: 256
  lora_dropout: 0.1
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - v_proj
    - o_proj
    - up_proj
    - down_proj
    - gate_proj
  modules_to_save: null
  init_lora_weights: true

training:
  backend: accelerate
  output_dir: ./outputs/lora_checkpoint
  num_train_epochs: 2
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  
  # Optimization
  optim: adamw_8bit
  max_grad_norm: 1.0
  gradient_checkpointing: true
  
  # Logging and saving
  logging_steps: 10
  save_steps: 100
  eval_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  early_stopping_patience: 3
  
  # Platform
  dataloader_num_workers: 8
  dataloader_pin_memory: true
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
  dataloader_drop_last: true
  group_by_length: false
  
  # DeepSpeed
  deepspeed: ./configs/deepspeed_zero2.json
  
  # Precision
  fp16: false
  bf16: true
  tf32: true

data:
  samples_path: ./outputs/ssd_samples/samples.jsonl
  source_data_path: ./data/perception_test
  num_frames: 4
  frame_sampling_strategy: uniform
  resize_shortest_edge: 224
  max_seq_length: 4096
  vqa_buffer_ratio: 0.1
  validation_split_ratio: 0.05

evaluation:
  eval_strategy: steps
  eval_steps: 500
  metric_names:
    - loss

wandb:
  project: ssd-vlm
  entity: null
  name: lora-finetuning
  notes: Stage 1 LoRA adaptation on SSD samples

seed: 42
