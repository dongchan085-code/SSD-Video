# OVO-Bench Evaluation Configuration - Base Model
# Evaluates Qwen3-VL-8B-Instruct on OVO-Bench with 4-frame budget.

extends: _t4_nf4_sdpa.yaml

model:
  model_id: Qwen/Qwen3-VL-8B-Instruct

inference:
  num_frames: 4
  recent_frames_only: 4
  chunk_duration: 1.0
  fps: 1.0
  frame_sampling_strategy: recent
  resize_shortest_edge: 224
  max_new_tokens: 64
  temperature: 1.0
  top_p: 1.0
  top_k: 1
  do_sample: false
  use_cache: true

data:
  dataset_name: ovo_bench
  data_path: ./data/ovo_bench
  anno_path: ./data/ovo_bench/ovo_bench_new.json
  chunked_dir: ./data/ovo_bench/chunked_videos
  split: test
  batch_size: 1
  num_workers: 2

evaluation:
  metrics:
    - accuracy
    - per_task_accuracy
    - lock_fork_split
  save_predictions: true
  output_format: json
  save_detailed_results: true

logging:
  log_level: INFO
  log_interval: 10

hardware:
  cuda_visible_devices: 0
  seed: 42
