# Ablation: Greedy self-distillation (τ=0 / greedy decoding)
# Sample completions from the base model using greedy decoding, then fine-tune.
# Tests: is high-temperature sampling specifically needed, or does any
# self-generated data (even greedy) improve memory tasks?

model:
  model_id: Qwen/Qwen3-VL-8B-Instruct
  dtype: bfloat16
  device_map: auto

generation:
  temperature: 0.0
  top_k: 1
  top_p: 1.0
  do_sample: false
  max_new_tokens: 512
  min_new_tokens: 1

lora:
  r: 128
  lora_alpha: 256
  lora_dropout: 0.1
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - v_proj
    - o_proj
    - up_proj
    - down_proj
    - gate_proj

training:
  output_dir: ./outputs/ablation_greedy_ssd_checkpoint
  num_train_epochs: 2
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  optim: adamw_8bit
  max_grad_norm: 1.0
  gradient_checkpointing: true
  logging_steps: 10
  save_steps: 100
  eval_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  deepspeed: ./configs/deepspeed_zero2.json
  fp16: false
  bf16: true
  tf32: true

data:
  dataset_name: perception_test
  split: train
  data_path: ./data/perception_test
  num_frames: 4
  frame_sampling_strategy: uniform
  resize_shortest_edge: 224
  max_seq_length: 4096
  memory_skill_oversample_ratio: 2.0
  vqa_buffer_ratio: 0.1

wandb:
  project: ssd-vlm-ablations
  name: greedy-ssd
  notes: "Ablation - greedy (tau=0) self-distillation to isolate high-temp effect"

seed: 42
