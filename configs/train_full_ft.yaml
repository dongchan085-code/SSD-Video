# Full-parameter Fine-tuning Configuration
# Stage 2: Full parameter fine-tuning after LoRA (merged checkpoint)

model:
  model_id: Qwen/Qwen3-VL-8B-Instruct
  dtype: bfloat16
  device_map: auto
  load_in_8bit: false
  load_in_4bit: false

training:
  output_dir: ./outputs/ssd_vlm_final
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  weight_decay: 0.01
  
  # Optimization
  optim: adamw_8bit
  max_grad_norm: 1.0
  gradient_checkpointing: true
  
  # Logging and saving
  logging_steps: 10
  save_steps: 50
  eval_steps: 200
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  
  # Platform
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  dataloader_drop_last: true
  group_by_length: false
  
  # DeepSpeed for memory efficiency
  deepspeed: ./configs/deepspeed_zero3.json
  
  # Precision
  fp16: false
  bf16: true
  tf32: true

data:
  samples_path: ./outputs/ssd_samples/samples.jsonl
  num_frames: 4
  frame_sampling_strategy: uniform
  resize_shortest_edge: 224
  max_seq_length: 4096

evaluation:
  eval_strategy: steps
  eval_steps: 200
  metric_names:
    - loss

checkpoint:
  lora_checkpoint_path: ./outputs/lora_checkpoint
  merge_lora_before_training: true
  save_as_safetensors: true

wandb:
  project: ssd-vlm
  entity: null
  name: full-finetuning
  notes: Stage 2 full parameter fine-tuning after LoRA

seed: 42
